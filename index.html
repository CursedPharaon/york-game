<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>York</title>
    <style>
        * { box-sizing: border-box; font-family: monospace; user-select: none; }
        body { background: #0d0d0d; color: #eee; margin: 0; padding: 10px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #app { max-width: 700px; width: 100%; }
        .menu-box { background: #1a1a1a; padding: 30px 20px; border-radius: 16px; text-align: center; }
        .menu-box h1 { font-size: 48px; margin: 0; color: #8a8; }
        .menu-box h2 { color: #aaa; font-weight: normal; margin-top: 0; }
        .menu-btn { display: block; width: 100%; padding: 16px; margin: 10px 0; background: #2a2a2a; border: none; color: #eee; font-size: 18px; border-radius: 12px; cursor: pointer; font-weight: bold; }
        .menu-btn:hover { background: #3a3a3a; }
        .menu-btn.primary { background: #4a7a4a; }
        .menu-btn.primary:hover { background: #5a8a5a; }
        .menu-btn.danger { background: #6a2a2a; }
        .menu-btn.danger:hover { background: #8a3a3a; }
        .login-box { background: #1a1a1a; padding: 20px; border-radius: 12px; }
        .login-box input { width: 100%; padding: 12px; margin: 6px 0; background: #2a2a2a; border: none; color: #fff; border-radius: 6px; }
        .login-box button { width: 100%; padding: 12px; background: #4a7a4a; border: none; color: #fff; font-weight: bold; border-radius: 6px; margin-top: 6px; }
        .login-box .error { color: #c44; margin-top: 8px; }
        .top-bar { display: flex; justify-content: space-between; background: #1a1a1a; padding: 8px 12px; border-radius: 8px; flex-wrap: wrap; margin-bottom: 6px; }
        .res { display: flex; gap: 10px; flex-wrap: wrap; font-size: 14px; }
        .res span { background: #2a2a2a; padding: 4px 10px; border-radius: 16px; }
        .actions { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
        .actions button { background: #2a2a2a; border: none; color: #eee; padding: 6px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; }
        .actions .boom { background: #6a2a2a; }
        .actions .craft { background: #2a4a6a; }
        #mapWrapper { position: relative; width: 100%; height: 400px; overflow: hidden; background: #1a1a1a; border-radius: 8px; touch-action: none; }
        #map { display: grid; position: absolute; top: 0; left: 0; transform-origin: 0 0; }
        .cell { width: 30px; height: 30px; border: 0.5px solid #1a1a1a; display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; }
        .grass { background: #3a5a3a; }
        .tree { background: #2d7a2d; }
        .stone { background: #6a6a6a; }
        .house { background: #8a6a3a; border: 1px solid #b88a4a; }
        .water { background: #2a4a6a; }
        .iron { background: #8a7a6a; }
        .gold { background: #d4a020; }
        .chat-box { background: #1a1a1a; border-radius: 8px; padding: 6px; height: 140px; overflow-y: auto; font-size: 12px; margin: 6px 0; }
        .chat-box div { padding: 2px 0; border-bottom: 1px solid #222; }
        .chat-box .system { color: #8a8; }
        .chat-box .admin { color: #ffa500; }
        .chat-box .error { color: #c44; }
        .chat-input { display: flex; gap: 6px; }
        .chat-input input { flex: 1; padding: 8px; background: #2a2a2a; border: none; color: #fff; border-radius: 6px; }
        .chat-input button { padding: 8px 16px; background: #4a6a8a; border: none; color: #fff; border-radius: 6px; }
        .hidden { display: none !important; }
        .info { font-size: 12px; color: #888; padding: 4px 0; }
        .server-list { background: #1a1a1a; padding: 10px; border-radius: 8px; margin: 10px 0; max-height: 200px; overflow-y: auto; }
        .server-item { padding: 8px; border-bottom: 1px solid #2a2a2a; display: flex; justify-content: space-between; align-items: center; }
        .server-item button { background: #4a7a4a; border: none; color: #fff; padding: 4px 12px; border-radius: 4px; cursor: pointer; }
        .server-item .del-btn { background: #6a2a2a; }
        .back-btn { background: #2a2a2a; border: none; color: #aaa; padding: 8px 16px; border-radius: 20px; margin-bottom: 10px; cursor: pointer; }
        .add-server { display: flex; gap: 6px; margin: 10px 0; }
        .add-server input { flex: 1; padding: 8px; background: #2a2a2a; border: none; color: #fff; border-radius: 6px; }
        .add-server button { background: #4a6a8a; border: none; color: #fff; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .status { font-size: 12px; }
        .online { color: #4a4; }
        .offline { color: #a44; }
    </style>
</head>
<body>
<div id="app">
    <!-- ГЛАВНОЕ МЕНЮ -->
    <div id="menuScreen" class="menu-box">
        <h1>🔰 York</h1>
        <h2>Выбери режим</h2>
        <button class="menu-btn primary" onclick="showSingleplayer()">🌍 Одиночная игра</button>
        <button class="menu-btn" onclick="showMultiplayer()">🌐 Мультиплеер</button>
    </div>

    <!-- ОДИНОЧНАЯ ИГРА -->
    <div id="singleplayerScreen" class="hidden">
        <div class="menu-box" style="padding:15px;">
            <button class="back-btn" onclick="showMenu()">← Назад</button>
            <h3>🌍 Одиночный мир</h3>
            <input id="worldName" placeholder="Название мира" style="width:100%;padding:10px;background:#2a2a2a;border:none;color:#fff;border-radius:6px;margin:6px 0;">
            <button class="menu-btn primary" onclick="createSingleplayer()">Создать мир</button>
            <div id="singleplayerList" class="server-list"></div>
        </div>
    </div>

    <!-- МУЛЬТИПЛЕЕР -->
    <div id="multiplayerScreen" class="hidden">
        <div class="menu-box" style="padding:15px;">
            <button class="back-btn" onclick="showMenu()">← Назад</button>
            <h3>🌐 Мультиплеер</h3>
            <div id="serverList" class="server-list"></div>
            <div class="add-server">
                <input id="serverUrlInput" placeholder="Ссылка на сервер">
                <button onclick="addServer()">➕ Добавить</button>
            </div>
            <div id="loginBox">
                <input id="loginUser" placeholder="Никнейм">
                <input id="loginPass" type="password" placeholder="Пароль">
                <button onclick="login()">Войти</button>
                <button onclick="register()" style="background:#3a3a6a;">Регистрация</button>
                <div id="loginError" class="error"></div>
            </div>
        </div>
    </div>

    <!-- ИГРА -->
    <div id="gameScreen" class="hidden">
        <div class="top-bar">
            <div class="res">
                <span>🪵 <span id="wood">0</span></span>
                <span>🪨 <span id="stone">0</span></span>
                <span>⛏️ <span id="iron">0</span></span>
                <span>💥 <span id="dynamite">0</span></span>
                <span>✨ <span id="gold">0</span></span>
                <span>🪓 <span id="pickaxe">0</span></span>
                <span>🪓 <span id="axe">0</span></span>
                <span>💥⭐ <span id="upgraded_dynamite">0</span></span>
            </div>
            <div><span id="playerName" style="color:#8a8;"></span> <span id="serverName" style="color:#aaa;font-size:12px;"></span></div>
        </div>

        <div class="actions">
            <button onclick="gather('tree')">🌲 Срубить</button>
            <button onclick="gather('stone')">⛏️ Камень</button>
            <button onclick="gather('iron')">⛏️ Руда</button>
            <button onclick="gather('gold')">✨ Золото</button>
            <button onclick="buildHouse()">🏠 Дом</button>
            <button class="boom" onclick="prepareBoom()">💣 Взорвать</button>
            <button class="craft" onclick="openCraftModal()">🔧 Крафт</button>
            <button onclick="showInventory()">📦 Инвентарь</button>
            <button onclick="leaveGame()">🚪 Выйти</button>
        </div>

        <div id="mapWrapper">
            <div id="map"></div>
        </div>
        <div class="info" id="selectedInfo">Кликни по клетке</div>

        <div class="chat-box" id="chatBox"></div>
        <div class="chat-input">
            <input id="chatInput" placeholder="Чат или команда (/help)" onkeydown="if(event.key==='Enter')sendChat()">
            <button onclick="sendChat()">➤</button>
        </div>
    </div>

    <!-- МОДАЛКА КРАФТА -->
    <div id="craftModal" class="modal hidden">
        <div class="modal-inner">
            <h3>🔧 Крафт</h3>
            <div id="craftList"></div>
            <button onclick="closeModal('craftModal')">Закрыть</button>
        </div>
    </div>
</div>

<script>
    // ========== НАСТРОЙКИ ==========
    const SIZE = 150;
    const SERVER_ID = 1;

    let currentUser = null;
    let currentMode = null;
    let currentWorld = null;
    let currentServerUrl = null;
    let resources = { wood: 0, stone: 0, iron: 0, dynamite: 0, gold: 0, pickaxe: 0, axe: 0, upgraded_dynamite: 0 };
    let worldData = {};
    let selectedCell = null;
    let boomMode = false;
    let eventSource = null;
    let selectedHouse = null; // {x, y} для дома

    // ========== МОДАЛКИ ==========
    function closeModal(id) {
        document.getElementById(id).classList.add('hidden');
    }

    // ========== УПРАВЛЕНИЕ СЕРВЕРАМИ ==========
    function getServers() {
        return JSON.parse(localStorage.getItem('york_servers') || '[]');
    }

    function saveServers(servers) {
        localStorage.setItem('york_servers', JSON.stringify(servers));
    }

    function addServer() {
        const url = document.getElementById('serverUrlInput').value.trim();
        if (!url) { alert('Введите ссылку на сервер'); return; }
        let servers = getServers();
        if (servers.find(s => s.url === url)) { alert('Сервер уже добавлен'); return; }
        servers.push({ url, name: url.replace(/^https?:\/\//, '').split('.')[0] });
        saveServers(servers);
        document.getElementById('serverUrlInput').value = '';
        renderServerList();
    }

    function removeServer(url) {
        let servers = getServers();
        servers = servers.filter(s => s.url !== url);
        saveServers(servers);
        renderServerList();
    }

    function renderServerList() {
        const list = document.getElementById('serverList');
        const servers = getServers();
        if (servers.length === 0) {
            list.innerHTML = '<div style="padding:10px;color:#666;">Нет серверов. Добавь по ссылке!</div>';
            return;
        }
        list.innerHTML = servers.map(s => `
            <div class="server-item">
                <span>🌐 ${s.name}</span>
                <div>
                    <span class="status" id="status_${s.url}">⏳ проверка...</span>
                    <button onclick="connectToServer('${s.url}')">Подключиться</button>
                    <button class="del-btn" onclick="removeServer('${s.url}')">🗑️</button>
                </div>
            </div>
        `).join('');
        servers.forEach(s => checkServerStatus(s.url));
    }

    async function checkServerStatus(url) {
        const el = document.getElementById('status_' + url);
        if (!el) return;
        try {
            const resp = await fetch(url + '/get_servers');
            if (resp.ok) {
                el.textContent = '✅ онлайн';
                el.className = 'status online';
            } else {
                el.textContent = '❌ офлайн';
                el.className = 'status offline';
            }
        } catch (e) {
            el.textContent = '❌ офлайн';
            el.className = 'status offline';
        }
    }

    function connectToServer(url) {
        currentServerUrl = url;
        document.getElementById('loginBox').classList.remove('hidden');
        const saved = JSON.parse(localStorage.getItem('york_credentials_' + url) || '{}');
        document.getElementById('loginUser').value = saved.username || '';
        document.getElementById('loginPass').value = saved.password || '';
        document.getElementById('loginError').textContent = '';
    }

    // ========== ЛОГИН ==========
    async function login() {
        const username = document.getElementById('loginUser').value.trim();
        const password = document.getElementById('loginPass').value.trim();
        if (!username || !password) { showError('Заполните все поля'); return; }
        if (!currentServerUrl) { showError('Сначала выбери сервер'); return; }
        
        localStorage.setItem('york_credentials_' + currentServerUrl, JSON.stringify({ username, password }));
        
        const result = await apiCall('/login', 'POST', { username, password });
        if (result.success) {
            currentUser = username;
            currentMode = 'multi';
            currentWorld = 'York Wibe';
            await loadResources();
            await loadWorld();
            enterGame('Мультиплеер: ' + currentWorld, result.admin_prefix);
            startChatStream();
        } else {
            showError(result.error || 'Ошибка входа');
        }
    }

    async function register() {
        const username = document.getElementById('loginUser').value.trim();
        const password = document.getElementById('loginPass').value.trim();
        if (!username || !password) { showError('Заполните все поля'); return; }
        if (!currentServerUrl) { showError('Сначала выбери сервер'); return; }
        const result = await apiCall('/register', 'POST', { username, password });
        if (result.success) {
            showError('✅ Зарегистрирован! Теперь войдите.');
        } else {
            showError(result.error || 'Ошибка регистрации');
        }
    }

    function showError(msg) {
        const el = document.getElementById('loginError');
        el.textContent = msg;
        setTimeout(() => el.textContent = '', 4000);
    }

    // ========== API ==========
    async function apiCall(endpoint, method = 'POST', data = null) {
        if (!currentServerUrl) { return { success: false, error: 'Сервер не выбран' }; }
        try {
            const options = { method, headers: { 'Content-Type': 'application/json' } };
            if (data) options.body = JSON.stringify(data);
            const resp = await fetch(currentServerUrl + endpoint, options);
            return await resp.json();
        } catch (e) {
            console.error('API ошибка:', e);
            return { success: false, error: 'Сервер недоступен' };
        }
    }

    async function loadResources() {
        const resData = await apiCall('/get_resources', 'POST', { username: currentUser });
        resources = { 
            wood: resData.wood || 0, stone: resData.stone || 0, iron: resData.iron || 0, 
            dynamite: resData.dynamite || 0, gold: resData.gold || 0,
            pickaxe: resData.pickaxe || 0, axe: resData.axe || 0,
            upgraded_dynamite: resData.upgraded_dynamite || 0
        };
    }

    async function loadWorld() {
        const world = await apiCall('/get_world', 'POST', { server_id: SERVER_ID });
        worldData = world;
    }

    // ========== ЧАТ В РЕАЛЬНОМ ВРЕМЕНИ ==========
    function startChatStream() {
        if (eventSource) { eventSource.close(); eventSource = null; }
        if (!currentServerUrl) return;
        try {
            eventSource = new EventSource(currentServerUrl + '/stream_chat');
            eventSource.onmessage = function(event) {
                const data = JSON.parse(event.data);
                addChatMessage(data.user, data.msg, data.time);
            };
            eventSource.onerror = function() {
                setTimeout(startChatStream, 3000);
            };
        } catch (e) {
            console.error('SSE ошибка:', e);
        }
    }

    function addChatMessage(user, msg, time) {
        const box = document.getElementById('chatBox');
        const div = document.createElement('div');
        const isSystem = user === 'Система';
        const isAdmin = user.includes('[Модератор]') || user.includes('[Ст.Модератор]') || user.includes('[Куратор]') || user.includes('[Владыка]');
        let cls = '';
        if (isSystem) cls = 'system';
        else if (isAdmin) cls = 'admin';
        if (msg.startsWith('❌')) cls = 'error';
        div.className = cls;
        div.innerHTML = `<b>${user}</b> ${msg} <span style="color:#666;font-size:10px;">${time || ''}</span>`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    // ========== ОДИНОЧНАЯ ИГРА ==========
    function loadSingleplayerList() {
        const list = document.getElementById('singleplayerList');
        const worlds = JSON.parse(localStorage.getItem('york_singleplayer_worlds') || '[]');
        list.innerHTML = worlds.length ? worlds.map(w => `
            <div class="server-item">
                <span>🌍 ${w}</span>
                <div>
                    <button onclick="loadSingleplayer('${w}')">Играть</button>
                    <button class="del-btn" onclick="deleteSingleplayer('${w}')">🗑️</button>
                </div>
            </div>
        `).join('') : '<div style="padding:10px;color:#666;">Нет миров. Создай новый!</div>';
    }

    function createSingleplayer() {
        const name = document.getElementById('worldName').value.trim();
        if (!name) { alert('Введите название мира'); return; }
        let worlds = JSON.parse(localStorage.getItem('york_singleplayer_worlds') || '[]');
        if (worlds.includes(name)) { alert('Мир уже существует'); return; }
        worlds.push(name);
        localStorage.setItem('york_singleplayer_worlds', JSON.stringify(worlds));
        const world = generateWorld(SIZE);
        localStorage.setItem('york_singleplayer_' + name, JSON.stringify({ world, resources: { wood: 20, stone: 10, iron: 0, dynamite: 0, gold: 0, pickaxe: 0, axe: 0, upgraded_dynamite: 0 } }));
        document.getElementById('worldName').value = '';
        loadSingleplayerList();
        loadSingleplayer(name);
    }

    function deleteSingleplayer(name) {
        if (!confirm(`Удалить мир "${name}"?`)) return;
        let worlds = JSON.parse(localStorage.getItem('york_singleplayer_worlds') || '[]');
        worlds = worlds.filter(w => w !== name);
        localStorage.setItem('york_singleplayer_worlds', JSON.stringify(worlds));
        localStorage.removeItem('york_singleplayer_' + name);
        loadSingleplayerList();
    }

    function loadSingleplayer(name) {
        currentMode = 'single';
        currentWorld = name;
        currentServerUrl = null;
        const data = JSON.parse(localStorage.getItem('york_singleplayer_' + name) || 'null');
        if (data) {
            worldData = data.world;
            resources = data.resources || { wood: 20, stone: 10, iron: 0, dynamite: 0, gold: 0, pickaxe: 0, axe: 0, upgraded_dynamite: 0 };
        } else {
            worldData = generateWorld(SIZE);
            resources = { wood: 20, stone: 10, iron: 0, dynamite: 0, gold: 0, pickaxe: 0, axe: 0, upgraded_dynamite: 0 };
        }
        currentUser = 'Игрок';
        enterGame('Одиночный мир: ' + name, '');
    }

    function saveSingleplayer() {
        if (currentMode === 'single' && currentWorld) {
            const data = { world: worldData, resources: resources };
            localStorage.setItem('york_singleplayer_' + currentWorld, JSON.stringify(data));
        }
    }

    // ========== ГЕНЕРАЦИЯ МИРА ==========
    function generateWorld(size) {
        const world = {};
        for (let x = 0; x < size; x++) {
            for (let y = 0; y < size; y++) {
                const r = Math.random();
                let type = 'grass';
                if (r < 0.15) type = 'water';
                else if (r < 0.30) type = 'stone';
                else if (r < 0.50) type = 'tree';
                else if (r < 0.55) type = 'iron';
                else if (r < 0.58) type = 'gold';
                else type = 'grass';
                world[x+','+y] = { type, owner: null, house_level: 0 };
            }
        }
        return world;
    }

    // ========== НАВИГАЦИЯ ==========
    function showMenu() { hideAll(); document.getElementById('menuScreen').classList.remove('hidden'); }
    function showSingleplayer() { hideAll(); document.getElementById('singleplayerScreen').classList.remove('hidden'); loadSingleplayerList(); }
    function showMultiplayer() { hideAll(); document.getElementById('multiplayerScreen').classList.remove('hidden'); renderServerList(); document.getElementById('loginBox').classList.remove('hidden'); }
    function hideAll() {
        ['menuScreen', 'singleplayerScreen', 'multiplayerScreen', 'gameScreen'].forEach(id => {
            document.getElementById(id).classList.add('hidden');
        });
    }

    // ========== ВХОД В ИГРУ ==========
    function enterGame(serverName, adminPrefix) {
        hideAll();
        document.getElementById('gameScreen').classList.remove('hidden');
        document.getElementById('playerName').textContent = (adminPrefix ? adminPrefix + ' ' : '') + (currentUser || 'Игрок');
        document.getElementById('serverName').textContent = serverName;
        updateUI();
        renderMap();
        if (currentMode === 'multi') { startChatStream(); }
        setupDrag();
        // Приветствие
        setTimeout(() => {
            addChatMessage('Система', '📖 Введи /help для списка команд', '');
        }, 500);
    }

    function leaveGame() {
        if (currentMode === 'single') saveSingleplayer();
        if (eventSource) { eventSource.close(); eventSource = null; }
        showMenu();
    }

    // ========== КАРТА ==========
    function renderMap() {
        const map = document.getElementById('map');
        const cellSize = 30 * (window._scale || 1);
        map.style.gridTemplateColumns = `repeat(${SIZE}, ${cellSize}px)`;
        map.innerHTML = '';
        for (let y = 0; y < SIZE; y++) {
            for (let x = 0; x < SIZE; x++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                const key = x + ',' + y;
                const data = worldData[key] || { type: 'grass', owner: null, house_level: 0 };
                cell.dataset.x = x;
                cell.dataset.y = y;
                cell.classList.add(data.type);
                if (data.owner) {
                    const level = data.house_level || 1;
                    cell.textContent = '🏠' + level;
                }
                cell.style.width = cellSize + 'px';
                cell.style.height = cellSize + 'px';
                cell.style.fontSize = (cellSize * 0.5) + 'px';
                cell.onclick = () => onCellClick(x, y);
                map.appendChild(cell);
            }
        }
        if (window._offsetX === undefined) window._offsetX = 0;
        if (window._offsetY === undefined) window._offsetY = 0;
        map.style.transform = `translate(${window._offsetX}px, ${window._offsetY}px)`;
    }

    function onCellClick(x, y) {
        const key = x + ',' + y;
        const data = worldData[key] || { type: 'grass', owner: null, house_level: 0 };
        document.getElementById('selectedInfo').textContent = `[${x},${y}] ${data.type}${data.owner ? ' 🏠'+data.owner+' (lv'+data.house_level+')' : ''}`;
        selectedCell = { x, y };
        
        if (boomMode) { boomMode = false; doBoom(x, y); return; }
        
        // Если клик по дому — показываем меню в чате
        if (data.type === 'house' && data.owner === currentUser) {
            selectedHouse = { x, y };
            showHouseMenu(x, y, data.house_level || 1);
        } else if (data.type === 'house' && data.owner && data.owner !== currentUser) {
            addChatMessage('Система', '❌ Это дом игрока ' + data.owner, '');
        }
    }

    // ========== МЕНЮ ДОМА В ЧАТЕ ==========
    function showHouseMenu(x, y, level) {
        const maxLevel = 5;
        const upgradeCosts = {
            1: { wood: 10, stone: 5, iron: 2 },
            2: { wood: 20, stone: 10, iron: 5 },
            3: { wood: 40, stone: 20, iron: 10 },
            4: { wood: 80, stone: 40, iron: 20 }
        };
        const cost = upgradeCosts[level];
        const canUpgrade = level < maxLevel && cost && 
            resources.wood >= cost.wood && resources.stone >= cost.stone && resources.iron >= cost.iron;
        
        let msg = `🏠 Дом (уровень ${level}/${maxLevel})\n`;
        msg += `📦 Слотов в сундуке: ${level * 5}\n`;
        msg += `📋 Команды:\n`;
        msg += `  /house upgrade — улучшить дом`;
        if (level < maxLevel && cost) {
            msg += ` (нужно: ${cost.wood}🪵 ${cost.stone}🪨 ${cost.iron}⛏️)`;
            if (!canUpgrade) msg += ` ❌ не хватает`;
        } else if (level >= maxLevel) {
            msg += ` ✅ дом максимального уровня`;
        }
        msg += `\n  /house chest — открыть сундук\n`;
        msg += `  /inv — показать инвентарь`;
        
        // Отправляем в чат как системное сообщение
        const lines = msg.split('\n');
        lines.forEach(line => {
            addChatMessage('Система', line, '');
        });
    }

    // ========== ИНВЕНТАРЬ ==========
    function showInventory() {
        let msg = `📦 Инвентарь ${currentUser}:\n`;
        msg += `  🪵 Древесина: ${Math.floor(resources.wood)}\n`;
        msg += `  🪨 Камень: ${Math.floor(resources.stone)}\n`;
        msg += `  ⛏️ Железо: ${Math.floor(resources.iron)}\n`;
        msg += `  ✨ Золото: ${Math.floor(resources.gold)}\n`;
        msg += `  💥 Динамит: ${Math.floor(resources.dynamite)}\n`;
        msg += `  💥⭐ Улучш.динамит: ${Math.floor(resources.upgraded_dynamite)}\n`;
        msg += `  🪓 Кирка: ${Math.floor(resources.pickaxe)} (увеличивает добычу камня/руды)\n`;
        msg += `  🪓 Топор: ${Math.floor(resources.axe)} (увеличивает добычу дерева)`;
        addChatMessage('Система', msg, '');
    }

    // ========== КОМАНДЫ ЧЕРЕЗ ЧАТ ==========
    async function sendChat() {
        const input = document.getElementById('chatInput');
        const msg = input.value.trim();
        if (!msg) return;
        input.value = '';
        
        // Команды (/)
        if (msg.startsWith('/')) {
            await handleCommand(msg);
            return;
        }
        
        // Обычный чат
        if (currentMode === 'single') {
            addChatMessage(currentUser || 'Игрок', msg, '');
            return;
        }
        await apiCall('/send_chat', 'POST', { username: currentUser, message: msg, server_id: SERVER_ID });
    }

    async function handleCommand(cmd) {
        const parts = cmd.split(' ');
        const command = parts[0].toLowerCase();
        
        // === /help ===
        if (command === '/help') {
            let msg = '📖 Доступные команды:\n';
            msg += '  /inv — инвентарь\n';
            msg += '  /house upgrade — улучшить дом\n';
            msg += '  /house chest — открыть сундук\n';
            msg += '  /chest put [предмет] [кол-во] — положить в сундук\n';
            msg += '  /chest take [предмет] [кол-во] — взять из сундука\n';
            msg += '  /help — эта справка\n';
            if (currentMode === 'multi') {
                msg += '  /mute [ник] [30m/1h] — замутить (для модераторов)\n';
                msg += '  /ban [ник] [причина] — забанить (для модераторов)';
            }
            addChatMessage('Система', msg, '');
            return;
        }
        
        // === /inv ===
        if (command === '/inv') {
            showInventory();
            return;
        }
        
        // === /house upgrade ===
        if (command === '/house' && parts.length >= 2 && parts[1] === 'upgrade') {
            if (!selectedHouse) {
                addChatMessage('Система', '❌ Сначала кликни на свой дом', '');
                return;
            }
            const { x, y } = selectedHouse;
            const key = x + ',' + y;
            const data = worldData[key];
            if (!data || data.type !== 'house' || data.owner !== currentUser) {
                addChatMessage('Система', '❌ Это не твой дом', '');
                return;
            }
            const level = data.house_level || 1;
            if (level >= 5) {
                addChatMessage('Система', '✅ Дом уже максимального уровня!', '');
                return;
            }
            const costs = {
                1: { wood: 10, stone: 5, iron: 2 },
                2: { wood: 20, stone: 10, iron: 5 },
                3: { wood: 40, stone: 20, iron: 10 },
                4: { wood: 80, stone: 40, iron: 20 }
            };
            const cost = costs[level];
            if (!cost) { addChatMessage('Система', '❌ Ошибка: неизвестный уровень', ''); return; }
            if (resources.wood < cost.wood || resources.stone < cost.stone || resources.iron < cost.iron) {
                addChatMessage('Система', `❌ Не хватает ресурсов! Нужно: ${cost.wood}🪵 ${cost.stone}🪨 ${cost.iron}⛏️`, '');
                return;
            }
            // Списываем ресурсы
            resources.wood -= cost.wood;
            resources.stone -= cost.stone;
            resources.iron -= cost.iron;
            // Обновляем уровень дома
            const newLevel = level + 1;
            data.house_level = newLevel;
            await saveAll();
            updateUI();
            renderMap();
            addChatMessage('Система', `🏠 Дом улучшен до уровня ${newLevel}!`, '');
            // Показываем обновлённое меню
            showHouseMenu(x, y, newLevel);
            return;
        }
        
        // === /house chest ===
        if (command === '/house' && parts.length >= 2 && parts[1] === 'chest') {
            if (!selectedHouse) {
                addChatMessage('Система', '❌ Сначала кликни на свой дом', '');
                return;
            }
            const { x, y } = selectedHouse;
            const key = x + ',' + y;
            const data = worldData[key];
            if (!data || data.type !== 'house' || data.owner !== currentUser) {
                addChatMessage('Система', '❌ Это не твой дом', '');
                return;
            }
            const level = data.house_level || 1;
            const slots = level * 5;
            // Показываем содержимое сундука
            let msg = `📦 Сундук (${slots} слотов, уровень ${level}):\n`;
            // В упрощённой версии — показываем что есть
            const chestItems = JSON.parse(localStorage.getItem('york_chest_' + currentUser) || '{}');
            const items = Object.entries(chestItems);
            if (items.length === 0) {
                msg += '  (пусто)';
            } else {
                items.forEach(([item, amount]) => {
                    msg += `  ${item}: ${amount}\n`;
                });
            }
            msg += `\n📋 Команды для сундука:\n`;
            msg += `  /chest put [предмет] [кол-во] — положить\n`;
            msg += `  /chest take [предмет] [кол-во] — взять`;
            addChatMessage('Система', msg, '');
            return;
        }
        
        // === /chest put ===
        if (command === '/chest' && parts.length >= 4 && parts[1] === 'put') {
            const itemType = parts[2];
            const amount = parseInt(parts[3]);
            if (!amount || amount < 1) { addChatMessage('Система', '❌ Укажи количество', ''); return; }
            // Проверяем, есть ли у игрока этот предмет
            const resKey = itemType === 'wood' ? 'wood' : 
                          itemType === 'stone' ? 'stone' :
                          itemType === 'iron' ? 'iron' :
                          itemType === 'gold' ? 'gold' :
                          itemType === 'dynamite' ? 'dynamite' :
                          itemType === 'upgraded_dynamite' ? 'upgraded_dynamite' : null;
            if (!resKey || resources[resKey] === undefined) {
                addChatMessage('Система', `❌ Неизвестный предмет: ${itemType}`, '');
                return;
            }
            if (resources[resKey] < amount) {
                addChatMessage('Система', `❌ У тебя только ${Math.floor(resources[resKey])} ${itemType}`, '');
                return;
            }
            // Списываем у игрока
            resources[resKey] -= amount;
            // Кладём в сундук
            const chest = JSON.parse(localStorage.getItem('york_chest_' + currentUser) || '{}');
            chest[itemType] = (chest[itemType] || 0) + amount;
            localStorage.setItem('york_chest_' + currentUser, JSON.stringify(chest));
            await saveAll();
            updateUI();
            addChatMessage('Система', `✅ Положил ${amount} ${itemType} в сундук`, '');
            return;
        }
        
        // === /chest take ===
        if (command === '/chest' && parts.length >= 4 && parts[1] === 'take') {
            const itemType = parts[2];
            const amount = parseInt(parts[3]);
            if (!amount || amount < 1) { addChatMessage('Система', '❌ Укажи количество', ''); return; }
            const chest = JSON.parse(localStorage.getItem('york_chest_' + currentUser) || '{}');
            if (!chest[itemType] || chest[itemType] < amount) {
                addChatMessage('Система', `❌ В сундуке только ${chest[itemType] || 0} ${itemType}`, '');
                return;
            }
            // Забираем из сундука
            chest[itemType] -= amount;
            if (chest[itemType] <= 0) delete chest[itemType];
            localStorage.setItem('york_chest_' + currentUser, JSON.stringify(chest));
            // Добавляем игроку
            const resKey = itemType === 'wood' ? 'wood' : 
                          itemType === 'stone' ? 'stone' :
                          itemType === 'iron' ? 'iron' :
                          itemType === 'gold' ? 'gold' :
                          itemType === 'dynamite' ? 'dynamite' :
                          itemType === 'upgraded_dynamite' ? 'upgraded_dynamite' : null;
            if (resKey && resources[resKey] !== undefined) {
                resources[resKey] += amount;
            } else {
                addChatMessage('Система', `❌ Неизвестный предмет: ${itemType}`, '');
                return;
            }
            await saveAll();
            updateUI();
            addChatMessage('Система', `✅ Забрал ${amount} ${itemType} из сундука`, '');
            return;
        }
        
        // === АДМИН-КОМАНДЫ (для мультиплеера) ===
        if (currentMode === 'multi') {
            if (command === '/mute' && parts.length >= 3) {
                const target = parts[1];
                const duration = parts[2];
                const result = await apiCall('/admin_command', 'POST', { admin: currentUser, command: 'mute', target, duration });
                if (result.success) {
                    addChatMessage('Система', '🔇 ' + result.message, '');
                } else {
                    addChatMessage('Система', '❌ ' + result.error, '');
                }
                return;
            }
            
            if (command === '/unmute' && parts.length >= 2) {
                const target = parts[1];
                const result = await apiCall('/admin_command', 'POST', { admin: currentUser, command: 'unmute', target });
                if (result.success) {
                    addChatMessage('Система', '🔊 ' + result.message, '');
                } else {
                    addChatMessage('Система', '❌ ' + result.error, '');
                }
                return;
            }
            
            if (command === '/ban' && parts.length >= 3) {
                const target = parts[1];
                const reason = parts.slice(2).join(' ');
                const result = await apiCall('/admin_command', 'POST', { admin: currentUser, command: 'ban', target, reason });
                if (result.success) {
                    addChatMessage('Система', '🔨 ' + result.message, '');
                } else {
                    addChatMessage('Система', '❌ ' + result.error, '');
                }
                return;
            }
            
            if (command === '/tempban' && parts.length >= 4) {
                const target = parts[1];
                const reason = parts.slice(2, -1).join(' ');
                const duration = parts[parts.length - 1];
                const result = await apiCall('/admin_command', 'POST', { admin: currentUser, command: 'tempban', target, reason, duration });
                if (result.success) {
                    addChatMessage('Система', '⏳ ' + result.message, '');
                } else {
                    addChatMessage('Система', '❌ ' + result.error, '');
                }
                return;
            }
            
            if (command === '/unban' && parts.length >= 2) {
                const target = parts[1];
                const result = await apiCall('/admin_command', 'POST', { admin: currentUser, command: 'unban', target });
                if (result.success) {
                    addChatMessage('Система', '🔓 ' + result.message, '');
                } else {
                    addChatMessage('Система', '❌ ' + result.error, '');
                }
                return;
            }
            
            if (command === '/addadmin' && parts.length >= 3) {
                const target = parts[1];
                const level = parts[2];
                const result = await apiCall('/admin_command', 'POST', { admin: currentUser, command: 'addadmin', target, level });
                if (result.success) {
                    addChatMessage('Система', '⭐ ' + result.message, '');
                } else {
                    addChatMessage('Система', '❌ ' + result.error, '');
                }
                return;
            }
            
            if (command === '/removeadmin' && parts.length >= 2) {
                const target = parts[1];
                const result = await apiCall('/admin_command', 'POST', { admin: currentUser, command: 'removeadmin', target });
                if (result.success) {
                    addChatMessage('Система', '⭐ ' + result.message, '');
                } else {
                    addChatMessage('Система', '❌ ' + result.error, '');
                }
                return;
            }
        }
        
        addChatMessage('Система', '❌ Неизвестная команда. Введи /help', '');
    }

    // ========== ПЕРЕТАСКИВАНИЕ И ЗУМ ==========
    let startX, startY, startOffX, startOffY;

    function setupDrag() {
        const wrapper = document.getElementById('mapWrapper');
        wrapper.removeEventListener('touchstart', onTouchStart);
        wrapper.removeEventListener('touchmove', onTouchMove);
        wrapper.addEventListener('touchstart', onTouchStart);
        wrapper.addEventListener('touchmove', onTouchMove);
        wrapper.addEventListener('wheel', onWheel);
    }

    function onTouchStart(e) {
        const touch = e.touches[0];
        startX = touch.clientX;
        startY = touch.clientY;
        startOffX = window._offsetX || 0;
        startOffY = window._offsetY || 0;
        if (e.touches.length === 2) {
            const t1 = e.touches[0], t2 = e.touches[1];
            window._dist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
            window._scale = window._scale || 1;
        }
    }

    function onTouchMove(e) {
        e.preventDefault();
        if (e.touches.length === 1) {
            const touch = e.touches[0];
            const dx = touch.clientX - startX;
            const dy = touch.clientY - startY;
            window._offsetX = startOffX + dx;
            window._offsetY = startOffY + dy;
            document.getElementById('map').style.transform = `translate(${window._offsetX}px, ${window._offsetY}px)`;
        } else if (e.touches.length === 2) {
            const t1 = e.touches[0], t2 = e.touches[1];
            const dist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
            const oldDist = window._dist || dist;
            const oldScale = window._scale || 1;
            let newScale = oldScale * (dist / oldDist);
            newScale = Math.min(2, Math.max(0.5, newScale));
            window._scale = newScale;
            window._dist = dist;
            renderMap();
        }
    }

    function onWheel(e) {
        e.preventDefault();
        const delta = e.deltaY > 0 ? -0.1 : 0.1;
        window._scale = Math.min(2, Math.max(0.5, (window._scale || 1) + delta));
        renderMap();
    }

    // ========== ДЕЙСТВИЯ ==========
    async function gather(type) {
        if (!selectedCell) { alert('Сначала выбери клетку'); return; }
        const { x, y } = selectedCell;
        const key = x + ',' + y;
        const data = worldData[key];
        if (!data || data.type !== type) { 
            alert('Здесь нет ' + (type === 'tree' ? 'дерева' : type === 'stone' ? 'камня' : type === 'iron' ? 'руды' : 'золота')); 
            return; 
        }
        if (data.owner) { alert('Это занято'); return; }
        
        let amount = 1;
        if (type === 'tree' && resources.axe > 0) amount = 1 + resources.axe * 0.5;
        else if ((type === 'stone' || type === 'iron') && resources.pickaxe > 0) amount = 1 + resources.pickaxe * 0.5;
        else if (type === 'tree') amount = 2;
        else if (type === 'stone') amount = 2;
        else if (type === 'iron') amount = 1;
        else if (type === 'gold') amount = 0.5;
        
        const resKey = type === 'tree' ? 'wood' : type === 'stone' ? 'stone' : type === 'iron' ? 'iron' : 'gold';
        resources[resKey] += amount;
        data.type = 'grass';
        data.owner = null;
        await saveAll();
        updateUI();
        renderMap();
    }

    async function buildHouse() {
        if (!selectedCell) { alert('Выбери клетку'); return; }
        const { x, y } = selectedCell;
        const key = x + ',' + y;
        const data = worldData[key];
        if (!data || data.type !== 'grass') { alert('Только на траве'); return; }
        if (data.owner) { alert('Уже занято'); return; }
        if (resources.wood < 5 || resources.stone < 3) { alert('Нужно 5 дерева и 3 камня'); return; }
        resources.wood -= 5; resources.stone -= 3;
        data.type = 'house'; data.owner = currentUser; data.house_level = 1;
        await saveAll();
        updateUI();
        renderMap();
        addChatMessage('Система', '🏠 ' + currentUser + ' построил дом!', '');
        selectedHouse = { x, y };
        showHouseMenu(x, y, 1);
    }

    function prepareBoom() {
        if (resources.upgraded_dynamite > 0) {
            if (confirm('Использовать улучшенный динамит (взрыв 5x5)?')) {
                boomMode = true;
                boomType = 'upgraded';
                alert('💣 Выбери клетку для мощного взрыва');
                return;
            }
        }
        if (resources.dynamite < 1) { alert('Нет динамита! Скрафти его.'); return; }
        boomMode = true;
        boomType = 'normal';
        alert('💣 Выбери клетку для взрыва');
    }

    let boomType = 'normal';

    async function doBoom(x, y) {
        let radius = 1;
        let cost = 1;
        if (boomType === 'upgraded') {
            radius = 2;
            cost = 1;
            if (resources.upgraded_dynamite < 1) return;
            resources.upgraded_dynamite -= cost;
        } else {
            if (resources.dynamite < cost) return;
            resources.dynamite -= cost;
        }
        
        for (let dx = -radius; dx <= radius; dx++) {
            for (let dy = -radius; dy <= radius; dy++) {
                const k = (x+dx) + ',' + (y+dy);
                if (worldData[k]) {
                    worldData[k] = { type: 'grass', owner: null, house_level: 0 };
                }
            }
        }
        
        await saveAll();
        updateUI();
        renderMap();
        addChatMessage('Система', '💥 ' + currentUser + ' взорвал бомбу!', '');
        boomMode = false;
    }

    // ========== КРАФТЫ ==========
    function openCraftModal() {
        const modal = document.getElementById('craftModal');
        modal.classList.remove('hidden');
        const list = document.getElementById('craftList');
        const crafts = [
            { name: 'Динамит', cost: '5 камня + 3 железа + 1 золото', res: { stone: 5, iron: 3, gold: 1 }, result: { dynamite: 1 } },
            { name: 'Улучшенный динамит', cost: '10 камня + 5 железа + 3 золота', res: { stone: 10, iron: 5, gold: 3 }, result: { upgraded_dynamite: 1 } },
            { name: 'Кирка', cost: '3 дерева + 2 железа', res: { wood: 3, iron: 2 }, result: { pickaxe: 1 } },
            { name: 'Топор', cost: '3 дерева + 2 камня', res: { wood: 3, stone: 2 }, result: { axe: 1 } }
        ];
        list.innerHTML = crafts.map(c => `
            <div class="craft-item">
                <span><b>${c.name}</b> (${c.cost})</span>
                <button onclick="craftItem('${c.name}')" class="btn-craft">Скрафтить</button>
            </div>
        `).join('');
    }

    async function craftItem(name) {
        const crafts = {
            'Динамит': { res: { stone: 5, iron: 3, gold: 1 }, result: { dynamite: 1 } },
            'Улучшенный динамит': { res: { stone: 10, iron: 5, gold: 3 }, result: { upgraded_dynamite: 1 } },
            'Кирка': { res: { wood: 3, iron: 2 }, result: { pickaxe: 1 } },
            'Топор': { res: { wood: 3, stone: 2 }, result: { axe: 1 } }
        };
        const craft = crafts[name];
        if (!craft) return;
        
        for (const [res, amount] of Object.entries(craft.res)) {
            if (resources[res] < amount) {
                alert(`Не хватает ${res}! Нужно ${amount}`);
                return;
            }
        }
        
        for (const [res, amount] of Object.entries(craft.res)) {
            resources[res] -= amount;
        }
        for (const [res, amount] of Object.entries(craft.result)) {
            resources[res] += amount;
        }
        
        await saveAll();
        updateUI();
        addChatMessage('Система', '🔧 ' + currentUser + ' скрафтил ' + name + '!', '');
        closeModal('craftModal');
    }

    // ========== СОХРАНЕНИЕ ==========
    async function saveAll() {
        if (currentMode === 'single') {
            saveSingleplayer();
        } else if (currentMode === 'multi' && currentServerUrl) {
            await apiCall('/save_resources', 'POST', { username: currentUser, ...resources });
            await apiCall('/save_world', 'POST', { server_id: SERVER_ID, cells: worldData });
        }
    }

    // ========== UI ==========
    function updateUI() {
        document.getElementById('wood').textContent = Math.floor(resources.wood);
        document.getElementById('stone').textContent = Math.floor(resources.stone);
        document.getElementById('iron').textContent = Math.floor(resources.iron);
        document.getElementById('dynamite').textContent = Math.floor(resources.dynamite);
        document.getElementById('gold').textContent = Math.floor(resources.gold);
        document.getElementById('pickaxe').textContent = Math.floor(resources.pickaxe);
        document.getElementById('axe').textContent = Math.floor(resources.axe);
        document.getElementById('upgraded_dynamite').textContent = Math.floor(resources.upgraded_dynamite);
    }

    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    showMenu();
    console.log('🔰 York загружен!');
    console.log('📖 Команды: /help');
</script>
